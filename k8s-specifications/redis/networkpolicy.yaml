apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vote-namespace
  namespace: redis

spec:
  podSelector:
    matchLabels:
      app: redis

  policyTypes:
  - Ingress

  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vote

    ports:
    - protocol: TCP
      port: 6379