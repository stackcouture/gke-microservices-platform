apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: result-reader
  namespace: vote
rules:
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: result-reader-binding
  namespace: vote
subjects:
  - kind: ServiceAccount
    name: result-sa
    namespace: vote
roleRef:
  kind: Role
  name: result-reader
  apiGroup: rbac.authorization.k8s.io