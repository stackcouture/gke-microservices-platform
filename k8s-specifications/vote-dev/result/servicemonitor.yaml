apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: result-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - vote
  selector:
    matchLabels:
      app: result
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s