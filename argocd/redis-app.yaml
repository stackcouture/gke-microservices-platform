apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stackcouture/gke-microservices-platform.git
    targetRevision: main
    path: k8s-specifications/redis/redis

  destination:
    server: https://kubernetes.default.svc
    namespace: vote
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true